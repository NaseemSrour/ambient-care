<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=800, height=480"><style>body{margin:0;display:flex;justify-content:center;background:#ddd;}</style></head><body><style>@import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;700&display=swap');
.ac-root, .ac-root * { margin:0; padding:0; box-sizing:border-box;
  font-family:'Noto Naskh Arabic','Segoe UI',Tahoma,sans-serif; }
.ac-root { width:800px; height:480px; overflow:hidden; direction:rtl;
  text-align:right; background:#F4F1EA; color:#000; padding:18px 22px;
  display:flex; flex-direction:column; }
.ac-root .header { flex:0 0 auto; text-align:center; border-bottom:4px solid #000;
  padding-bottom:8px; margin-bottom:12px; }
.ac-root .greeting { font-size:58px; font-weight:900; line-height:1.05;
  display:flex; align-items:center; justify-content:center; gap:16px; }
.ac-root .greeting .pic { width:54px; height:54px; flex:0 0 auto; }
.ac-root .orient { font-size:28px; font-weight:700; margin-top:4px; }
.ac-root .orient .dot { margin:0 12px; }
.ac-root .body { display:flex; flex:1 1 auto; gap:18px; min-height:0;
  overflow:hidden; }
.ac-root .col { display:flex; flex-direction:column; min-height:0;
  overflow:hidden; }
.ac-root .col-side { flex:0 0 290px; }
.ac-root .col-main { flex:1 1 auto; }
.ac-root .checklist { list-style:none; overflow:hidden; }
.ac-root .checklist li { display:flex; align-items:center; gap:10px;
  font-size:26px; font-weight:600; margin-bottom:9px; }
.ac-root .checkbox { flex:0 0 30px; width:30px; height:30px;
  border:3px solid #000; display:flex; align-items:center;
  justify-content:center; font-size:22px; font-weight:900; }
.ac-root .checkbox.done { background:#000; color:#F4F1EA; }
.ac-root .task-text.done-text { text-decoration:line-through; opacity:.75; }
.ac-root .message-box { flex:1 1 auto; min-height:0; overflow:hidden;
  display:flex; align-items:center; justify-content:center; text-align:center;
  padding:18px; }
.ac-root .message-text { font-size:34px; font-weight:700; line-height:1.4; }
.ac-root .visits { flex:0 0 auto; list-style:none; margin-top:12px;
  padding-top:12px; border-top:3px solid #000; }
.ac-root .visits li { font-size:22px; font-weight:700; line-height:1.35;
  margin-bottom:6px; list-style:none; }
.ac-root .visits li::before { content:''; display:inline-block; width:11px;
  height:11px; background:#000; margin-left:10px; vertical-align:baseline; }
.ac-root .event-when { font-weight:400; }
.ac-root .empty { font-size:20px; opacity:.7; }
.ac-root .footer { flex:0 0 auto; border-top:4px solid #000; margin-top:10px;
  padding-top:8px; text-align:center; }
.ac-root .verse { font-size:28px; font-weight:600; }
.ac-root .verse-ref { font-size:20px; opacity:.75; margin-top:2px; }</style>
<div class="ac-root">
  <div class="header">
    <div class="greeting"><svg class="pic" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="22" r="10" fill="currentColor"/><g stroke="currentColor" stroke-width="4" stroke-linecap="round"><line x1="24" y1="4" x2="24" y2="10"/><line x1="6" y1="22" x2="12" y2="22"/><line x1="10" y1="8" x2="14" y2="12"/><line x1="38" y1="8" x2="34" y2="12"/></g><g fill="currentColor"><circle cx="28" cy="44" r="10"/><circle cx="41" cy="45" r="12"/><circle cx="51" cy="47" r="8"/><rect x="26" y="46" width="29" height="12" rx="6"/></g></svg>نهارك سعيد</div>
    <div class="orient">الخميس<span class="dot">•</span>9 تمّوز 2026</div>
  </div>
  <div class="body">
    <div class="col col-side">
      <ul class="checklist"><li><span class="checkbox done">✓</span><span class="task-text done-text">تناول الدواء</span></li></ul>
      <ul class="visits"><li><span class="event-title">زيارة يوسف</span> <span class="event-when">— الساعة ٥</span></li></ul>
    </div>
    <div class="col col-main">
      <div class="message-box"><div class="message-text">مرحباً يا جدّتي الغالية</div></div>
    </div>
  </div>
  <div class="footer"><div class="verse">"الرَّبُّ راعيَّ فلا يُعوِزُني شيء"</div><div class="verse-ref">مزمور ٢٣: ١</div></div>
</div></body></html>
